version: 1
provider: jvQuant
market: ab

timezone: Asia/Shanghai
loop_interval_seconds: 15
reconnect_interval_seconds: 30
stale_after_seconds: 180
realtime_no_message_grace_seconds: 180

trading_sessions:
  - name: morning
    start: "09:15"
    end: "11:30"
  - name: afternoon
    start: "13:00"
    end: "15:15"

monitor_windows:
  - name: open_drive
    start: "09:30"
    end: "09:50"
  - name: late_morning
    start: "11:10"
    end: "11:30"

subscription:
  symbols_env: JVQUANT_SUBSCRIBE_SYMBOLS
  default_symbols:
    - "600519"
    - "000001"
  levels:
    - lv1
    - lv2
    - lv10

realtime_discovery:
  enabled: true
  interval_seconds: 300
  max_symbols: 200
  seed_turnover_yi: 30
  include_current_large_turnover: true
  include_current_limitup: true

storage:
  status_path: data/runner_status.json
  sqlite_path: data/aegis_alpha.db
  parquet_root: data/parquet

post_close:
  enabled: true
  review_after: "15:10"

selection_validation:
  enabled: true
  after: "10:00"

hermes_webhook:
  enabled: false
  url_env: HERMES_AEGIS_WEBHOOK_URL
  secret_env: HERMES_AEGIS_WEBHOOK_SECRET
  timeout_seconds: 3

weclaw_notification:
  enabled: false
  api_url_env: AEGIS_ALPHA_WECLAW_API_URL
  target_env: AEGIS_ALPHA_WECLAW_TO
  timeout_seconds: 3
  allowed_title_prefixes:
    - BUYPOINT_ALERT
    - SELECTION_VALIDATION
  # AgentObservation 推送门控:notification_grade 由确定性策略计算,
  # 默认只推 urgent + important。agent 不自填等级。
  observation_grades:
    - urgent
    - important
