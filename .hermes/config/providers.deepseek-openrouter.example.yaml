# Hermes provider example for Aegis Alpha.
# Copy the relevant parts into ~/.hermes/config.yaml after installing Hermes.
# Store API keys in ~/.hermes/.env, not in this file.

model:
  provider: "openrouter"
  default: "anthropic/claude-opus-4.7"
  base_url: "https://openrouter.ai/api/v1"
  api_mode: "chat_completions"

# Fallback provider. Use DeepSeek direct, not DeepSeek through OpenRouter.
fallback_providers:
  - provider: "deepseek"
    model: "deepseek-v4-pro"

# Optional: switch the main model to DeepSeek direct when you want lower cost.
# fallback_providers can then point to OpenRouter for contrast.
# model:
#   provider: "deepseek"
#   default: "deepseek-v4-pro"
