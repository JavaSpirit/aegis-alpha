# Aegis Alpha reproducible Hermes config template.
# Copy to ~/.hermes/config.yaml through scripts/install_hermes_project_config.sh.
# Do not put API keys in this file; use ~/.hermes/.env.

model:
  provider: "openrouter"
  default: "anthropic/claude-opus-4.7"
  base_url: "https://openrouter.ai/api/v1"
  api_mode: "chat_completions"

providers: {}

fallback_providers:
  - provider: "deepseek"
    model: "deepseek-v4-pro"

credential_pool_strategies: {}

toolsets:
  - hermes-cli

agent:
  max_turns: 90
  gateway_timeout: 1800
  restart_drain_timeout: 180
  api_max_retries: 3
  tool_use_enforcement: auto

terminal:
  backend: local
  cwd: .
  timeout: 180
  persistent_shell: true

compression:
  enabled: true
  threshold: 0.5
  target_ratio: 0.2
  protect_last_n: 20

tool_output:
  max_bytes: 50000
  max_lines: 2000
  max_line_length: 2000

prompt_caching:
  cache_ttl: 5m

openrouter:
  response_cache: true
  response_cache_ttl: 300
  min_coding_score: 0.65

mcp_servers:
  aegis_alpha:
    command: "__PROJECT_ROOT__/.venv/bin/python"
    args:
      - "__PROJECT_ROOT__/scripts/run_mcp.py"
    enabled: true
    supports_parallel_tool_calls: true
    tools:
      include:
        - get_market_snapshot
        - get_market_sentiment_gate
        - get_limitup_pool
        - get_break_board_pool
        - get_stock_realtime_snapshot
        - get_stock_orderbook_snapshot
        - get_stock_minute_replay_snapshot
        - get_recent_market_events
        - get_signal_snapshot
        - get_event_scoring_config
        - get_realtime_connection_status
        - get_runner_status
        - explain_market_event
        - review_candidate_outcome
        - record_candidate_outcome
        - get_recent_agent_reviews
        - record_agent_review_correction
        - get_agent_correction_summary
        - create_correction_action_proposals
        - get_pending_correction_actions
        - record_correction_action_decision
        - get_correction_action_history
        - get_stock_history_limitup_stats
        - get_theme_strength
        - get_theme_leaders
        - get_theme_continuity
        - get_limit_up_ladder
        - get_market_emotion
        - get_auction_analysis
        - get_seal_timeline
        - get_top_themes_today
        - get_second_board_candidates
        - get_second_board_candidates_compact
        - get_historical_second_board_candidates
        - get_historical_first_board_watchlist
        - get_strategy_watchlist
        - get_daily_strategy_candidate_pool
        - run_historical_strategy_replay
        - run_historical_trigger_validation
        - get_intraday_theme_copump
        - get_intraday_orderflow_confirmation
        - sample_realtime_large_trade_proxy
        - simulate_historical_orderflow_proxy
        - get_strategy_decision_packet
        - get_strategy_trend_outcomes
        - get_second_board_next_day_outcomes
        - record_selection_audit
        - get_selection_audit
        - get_selection_trigger_validation
        - get_market_sector_breadth
        - get_sector_breadth_continuity
        - get_news_alignment
        - get_tick_rule_orderflow_proxy
        - get_second_board_candidate_data_quality
        - get_promotion_dossier
        - explain_candidate
        - explain_second_board_candidate
        - generate_daily_review
        - generate_weekly_pattern_report
        - get_pending_alerts
        - acknowledge_alert
        - create_watchlist
        - update_watchlist_state
        - close_watchlist
        - list_active_watchlists
        - backfill_candidates
        - attribute_outcome
        - get_history_stats
        - run_backtest
        - get_recent_backtests
        - get_dragon_tiger
        - get_active_seats_today
        - get_limit_down_pool
        - get_st_pool
        - get_capital_flow_slices
        - find_similar_setups
        - get_new_stock_candidates
        - get_suspended_stocks
        - query_minute_bars
        - simulate_outcome
      prompts: false
      resources: false
